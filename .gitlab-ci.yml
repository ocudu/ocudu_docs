spec:
  inputs:
    ocudu_path:
      type: string
      default: ocudu/ocudu
      description: "OCUDU repository path."
    ocudu_ref:
      type: string
      default: dev
      description: "OCUDU reference branch or tag."
    ocudu_oran_apps_path:
      type: string
      default: ocudu/ocudu_elements/ocudu_oran_apps
      description: "OCUDU ORAN Apps reference branch or tag."
---
include:
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/workflow.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/static.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/gitlab_settings/.gitlab-ci.yml
    inputs:
      ocudu_path: $[[ inputs.ocudu_path ]]
      ocudu_ref: $[[ inputs.ocudu_ref ]]

stages:
  - ci
  - test
  - build

headers:
  stage: ci
  extends: .headers

get_ocudu_project_id:
  stage: .pre
  image: alpine:3
  before_script:
    - apk add --no-cache curl jq
  rules:
    - if: $ON_MR
    - if: $ON_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/
  script:
    # Fetch project details using GitLab API and extract the project ID
    - |
      PROJECT_PATH_ENCODED=$(echo "$[[ inputs.ocudu_path ]]" | sed 's/\//%2F/g')
      OCUDU_PROJECT_ID=$(curl --silent --fail --show-error \
        "${CI_API_V4_URL}/projects/${PROJECT_PATH_ENCODED}" | jq -r '.id')
      echo "OCUDU_PROJECT_ID=${OCUDU_PROJECT_ID}" >> build.env
      echo "OCUDU Project ID: ${OCUDU_PROJECT_ID}"
  artifacts:
    reports:
      dotenv: build.env

build:
  stage: test
  image: node:20
  needs:
    - job: get_ocudu_project_id
      artifacts: true
  rules:
    - if: $ON_MR
      variables:
        BASE_URL: /-/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/
  script:
    # Setup
    - npm install
    ## Git clone OCUDU repos
    - git clone -b $[[ inputs.ocudu_ref ]] ${CI_SERVER_URL}/$[[ inputs.ocudu_path ]].git docs/ocudu
    - mkdir -p docs/oran_apps
    - git clone ${CI_SERVER_URL}/$[[ inputs.ocudu_oran_apps_path ]]/ocudu_netconf.git oran_apps/ocudu_netconf
    - git clone ${CI_SERVER_URL}/$[[ inputs.ocudu_oran_apps_path ]]/ocudu_o1_adapter.git oran_apps/ocudu_o1_adapter
    ## Static
    - mkdir -p static/coverage static/doxygen
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" ${CI_API_V4_URL}/projects/${OCUDU_PROJECT_ID}/packages/generic/coverage_html/latest/coverage_html.tar.gz -o coverage_html.tar.gz
      tar -xzf coverage_html.tar.gz -C static/coverage --strip-components=1
      rm -f coverage_html.tar.gz
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" ${CI_API_V4_URL}/projects/${OCUDU_PROJECT_ID}/packages/generic/doxygen/latest/doxygen.tar.gz -o doxygen.tar.gz
      tar -xzf doxygen.tar.gz -C static/doxygen --strip-components=4
      rm -f doxygen.tar.gz
    # Build the Docusaurus site
    - npm run build
    # Move built site to public folder
    - mv build public
  after_script:
    - |
      echo "*******************************************************************************************************************************"
      echo "https://${CI_PROJECT_NAMESPACE_SLUG}.${CI_PAGES_DOMAIN}/-/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
      echo "*******************************************************************************************************************************"
  artifacts:
    paths:
      - public
    expire_in: 1 day

pages:
  extends: build
  stage: build
  environment:
    name: pages
    url: $CI_PAGES_URL
  rules:
    - if: $ON_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/
  after_script:
    - |
      echo "*******************************************************************************************************************************"
      echo "Deployed to Pages: ${CI_PAGES_URL}"
      echo "*******************************************************************************************************************************"
