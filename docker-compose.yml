# Docker Compose file for building and serving the OCUDU documentation site using Docusaurus.

# Before running, ensure that the OCUDU_GROUP_PATH environment variable is set to the path
# where the OCUDU repositories are located on your host machine.
# OCUDU_GROUP_PATH=/builds/ocudu docker compose up

services:
  docusaurus:
    image: node:20
    working_dir: /builds/ocudu/ocudu_docs
    volumes:
      - ./:/builds/ocudu/ocudu_docs
      # OCUDU repositories
      - ${OCUDU_GROUP_PATH}/ocudu:/builds/ocudu/ocudu_docs/docs/ocudu:ro
      - ${OCUDU_GROUP_PATH}/ocudu_elements/ocudu_oran_apps/:/builds/ocudu/ocudu_docs/oran_apps:ro
    ports:
      - "3000:3000"
    stop_grace_period: 1s
    user: "1000:1000"
    command: >
      sh -c "
      echo 'Starting Docusaurus server...' &&
      npm install &&
      npm run clear &&
      npm run start -- --host 0.0.0.0
      "
